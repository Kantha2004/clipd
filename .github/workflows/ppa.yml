name: PPA Upload

on:
  push:
    tags:
      - 'v*'
      - 'beta-v*'

jobs:
  ppa:
    name: Upload source package to Launchpad PPA
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Install packaging tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential golang-any \
            devscripts debhelper dput fakeroot \
            libgl-dev libx11-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev \
            libxi-dev libxxf86vm-dev

      # Handles gpg-agent setup for non-interactive signing in CI.
      - name: Import GPG signing key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Extract version from tag
        id: version
        run: |
          REF="${GITHUB_REF_NAME}"
          if [[ "$REF" == beta-v* ]]; then
            VERSION="${REF#beta-v}~beta"
          else
            VERSION="${REF#v}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into debian/changelog
        run: |
          sed -i "1s/([^)]*)/(${{ steps.version.outputs.VERSION }}-1)/" \
            debian/changelog

      - name: Build signed source package
        env:
          DEBSIGN_KEYID: ${{ steps.import-gpg.outputs.fingerprint }}
        run: make source VERSION=${{ steps.version.outputs.VERSION }}

      - name: Upload to Launchpad PPA
        run: make ppa VERSION=${{ steps.version.outputs.VERSION }}

name: PPA Upload

on:
  push:
    tags:
      - 'v*'
      - 'beta-v*'

jobs:
  ppa:
    name: Upload source package to Launchpad PPA
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Install packaging tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential golang-any \
            devscripts debhelper dput fakeroot \
            libgl-dev libx11-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev \
            libxi-dev libxxf86vm-dev

      # Handles gpg-agent setup for non-interactive signing in CI.
      - name: Import GPG signing key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Extract version from tag
        id: version
        run: |
          REF="${GITHUB_REF_NAME}"
          if [[ "$REF" == beta-v* ]]; then
            VERSION="${REF#beta-v}~beta"
          else
            VERSION="${REF#v}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and upload source packages for multiple suites
        env:
          DEBSIGN_KEYID: ${{ steps.import-gpg.outputs.fingerprint }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SUITES=("noble" "resolute")
          for i in "${!SUITES[@]}"; do
            SUITE="${SUITES[$i]}"
            echo "========================================="
            echo "Processing suite: $SUITE"
            echo "========================================="
            
            # Reset changelog to avoid cumulative changes
            git checkout debian/changelog
            
            # Format: version~suite-1 (e.g. 1.1.8-1~beta~noble-1)
            # This makes the upstream version unique per suite, preventing any file collisions on Launchpad.
            STAMPED_VERSION="${VERSION}~${SUITE}-1"
            
            # Replace version inside parentheses and the suite name
            sed -i "1s/([^)]*)/(${STAMPED_VERSION})/; 1s/) [a-z0-9-]*;/) ${SUITE};/" debian/changelog
            
            # Build the source package using the suite-specific upstream version
            make source VERSION="${VERSION}~${SUITE}"
            
            # Upload using dput
            dput ppa:kantha2004/clipd ../clipd_${STAMPED_VERSION}_source.changes
            
            # Sleep to prevent Launchpad FTP rate-limiting or session persistence issues
            if [ $i -lt $((${#SUITES[@]} - 1)) ]; then
              echo "Sleeping 20 seconds before the next suite upload..."
              sleep 20
            fi
          done




